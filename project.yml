name: BookBox
options:
  bundleIdPrefix: com.bookbox
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "T3494BN262"
targets:
  BookBox:
    type: application
    platform: iOS
    sources:
      - path: BookBox
        excludes:
          - "Resources/**"
    resources:
      - path: BookBox/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bookbox.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: false
    info:
      path: BookBox/Info.plist
      properties:
        CFBundleDisplayName: "BookBox"
        LSApplicationCategoryType: "public.app-category.utilities"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "需要使用相机拍摄书籍来识别书名"
        NSMicrophoneUsageDescription: "需要使用麦克风进行语音指令输入"
        NSSpeechRecognitionUsageDescription: "需要语音识别功能来理解您的语音指令"
        NSPhotoLibraryUsageDescription: "需要访问相册选取书籍照片"
        UILaunchScreen:
          UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
