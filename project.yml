name: BookBox
options:
  bundleIdPrefix: com.bookbox
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    INFOPLIST_KEY_CFBundleDisplayName: "BookBox"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
targets:
  BookBox:
    type: application
    platform: iOS
    sources:
      - path: BookBox
        excludes:
          - "Resources/**"
    resources:
      - path: BookBox/Resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.bookbox.app
        INFOPLIST_KEY_NSCameraUsageDescription: "需要使用相机拍摄书脊和封面来识别书名"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: false
